smtp:
  host: 0.0.0.0
  port: 8025

outputs:
  discord:
    enabled: true

    default:
      webhook: "PASTE_DISCORD_WEBHOOK_HERE"

  teams:
    enabled: true

    default:
      webhook: "PASTE_TEAMS_WORKFLOW_WEBHOOK_HERE"

routing:
  xo:
    outputs:
      - output: discord
        target: default

      # To also send Xen Orchestra notifications to Microsoft Teams:
      # 1. Paste the Teams workflow webhook above.
      # 2. Uncomment the following two lines.
      #
      # - output: teams
      #   target: default

  zabbix:
    output: discord
    target: default

  generic:
    output: discord
    target: default
