name: notifinho

services:
  notifinho:
    image: "${NOTIFINHO_IMAGE:-fortpt/notifinho:2.3.6}"
    container_name: notifinho
    restart: unless-stopped
    init: true
    stop_grace_period: 20s

    # Run with the deployment user's numeric identity. The mounted config and
    # logs directories must be writable by this UID/GID.
    user: "${NOTIFINHO_UID:-1000}:${NOTIFINHO_GID:-1000}"

    ports:
      - "${NOTIFINHO_SMTP_PORT:-8025}:8025"
      - "${NOTIFINHO_HTTP_PORT:-18080}:8080"

    environment:
      TZ: "${TZ:-Europe/Lisbon}"
      NOTIFINHO_STATE_DIR: "/notifinho/state"
      NOTIFINHO_SMTP_PASSWORD: "${NOTIFINHO_SMTP_PASSWORD:-}"
      NOTIFINHO_ADMIN_TOKEN: "${NOTIFINHO_ADMIN_TOKEN:-}"
      NOTIFINHO_HARDWARE_TOKEN: "${NOTIFINHO_HARDWARE_TOKEN:-}"
      NOTIFINHO_AVAILABLE_VERSION: "${NOTIFINHO_AVAILABLE_VERSION:-}"

    volumes:
      - "${NOTIFINHO_CONFIG_DIR:-./config}:/notifinho/config"
      - "${NOTIFINHO_LOG_DIR:-./logs}:/notifinho/logs"
      - "${NOTIFINHO_SECRETS_DIR:-./secrets}:/run/secrets:ro"
      - "${NOTIFINHO_STATE_DIR:-./state}:/notifinho/state"
      # This remains the safest backup mode: mount NFS/SMB on the host and bind
      # it here. The opt-in compose.managed-backups.yaml override is available
      # when Notifinho must manage remote mounts itself.
      - "${NOTIFINHO_EXTERNAL_BACKUP_DIR:-./external-backups}:/notifinho/external-backups"

    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
