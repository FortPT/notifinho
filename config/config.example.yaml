smtp:
  host: 0.0.0.0
  port: 8025

  # Optional explicit STARTTLS. Security remains disabled by default.
  tls:
    enabled: false
    certfile: "/notifinho/config/tls/cert.pem"
    keyfile: "/notifinho/config/tls/key.pem"

    # Defaults to true whenever TLS is enabled.
    # Set false only for a controlled migration.
    # require_starttls: false

  # Optional SMTP AUTH LOGIN/PLAIN. AUTH is available only after TLS.
  auth:
    enabled: false
    username: "notifinho"
    password_env: "NOTIFINHO_SMTP_PASSWORD"
    password_file: ""

    # Defaults to true whenever authentication is enabled.
    # Set false only for a controlled migration.
    # required: false

# Native UniFi Network and Protect webhook listener.
# Keep disabled unless the container port is intentionally published and
# protected by firewall rules and, when available, the shared secret.
http:
  enabled: false
  host: "0.0.0.0"
  port: 8080
  max_body_bytes: 1048576
  shared_secret: ""

outputs:
  discord:
    # Set to false to disable all Discord notifications.
    enabled: true

    # Primary Discord destination.
    default:
      webhook: "PASTE_DISCORD_WEBHOOK_HERE"

    # Dedicated Grafana alert destination.
    grafana:
      webhook: "PASTE_GRAFANA_DISCORD_WEBHOOK_HERE"

    # Dedicated TrueNAS alert destination.
    truenas:
      webhook: "PASTE_TRUENAS_DISCORD_WEBHOOK_HERE"

    # Shared UniFi Network, Protect, and Drive destination.
    unifi:
      webhook: "PASTE_UNIFI_DISCORD_WEBHOOK_HERE"

    # Optional secondary Discord destination.
    # Uncomment this block when forwarding selected hosts
    # to another Discord server or channel.
    #
    # palworld:
    #   webhook: "PASTE_SECONDARY_DISCORD_WEBHOOK_HERE"

  teams:
    # Change to true after adding a valid webhook
    # and enabling at least one Teams route below.
    enabled: false

    # Primary Microsoft Teams destination.
    default:
      webhook: "PASTE_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional separate Teams destination for Zabbix.
    #
    # zabbix:
    #   webhook: "PASTE_ZABBIX_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Teams destination for Grafana.
    #
    # grafana:
    #   webhook: "PASTE_GRAFANA_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Teams destination for TrueNAS.
    #
    # truenas:
    #   webhook: "PASTE_TRUENAS_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional shared UniFi destination.
    #
    # unifi:
    #   webhook: "PASTE_UNIFI_TEAMS_WORKFLOW_WEBHOOK_HERE"

routing:
  xo:
    outputs:
      # Send Xen Orchestra notifications to Discord.
      - output: discord
        target: default

      # To also send Xen Orchestra notifications to Microsoft Teams:
      # 1. Paste the Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: default

  zabbix:
    outputs:
      # Send every Zabbix notification to the primary
      # Discord destination.
      - output: discord
        target: default

      # To also send every Zabbix notification to Teams:
      # 1. Paste the Teams webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: default

      # Optional conditional route.
      #
      # This sends notifications only when the Zabbix host
      # exactly matches one of the names listed below.
      #
      # The primary destination above still receives every
      # Zabbix notification.
      #
      # - output: discord
      #   target: palworld
      #   match:
      #     hosts:
      #       - "VM-07 | Palworld"

      # Multiple hosts can use the same secondary destination:
      #
      # - output: discord
      #   target: palworld
      #   match:
      #     hosts:
      #       - "VM-07 | Palworld"
      #       - "VM-12 | Palworld Test"
      #       - "VM-18 | Game Server"

  qnap:
    outputs:
      # Send QNAP QTS and QuTS hero notifications to Discord.
      - output: discord
        target: default

      # To also send QNAP notifications to Microsoft Teams:
      # 1. Paste the Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: default

  grafana:
    outputs:
      # Send Grafana alerts to the dedicated Discord destination.
      - output: discord
        target: grafana

      # To also send Grafana alerts to a dedicated Teams destination:
      # 1. Paste the Grafana Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: grafana

  truenas:
    outputs:
      # Send TrueNAS alerts to the dedicated Discord destination.
      - output: discord
        target: truenas

      # To also send TrueNAS alerts to a dedicated Teams destination:
      # 1. Paste the TrueNAS Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: truenas

  unifi_network:
    outputs:
      # Network and Protect may share one target or use separate targets.
      - output: discord
        target: unifi

      # - output: teams
      #   target: unifi

  unifi_protect:
    outputs:
      - output: discord
        target: unifi

      # - output: teams
      #   target: unifi

  unifi_drive:
    outputs:
      # Drive email follows the same normalized routing pipeline.
      - output: discord
        target: unifi

      # - output: teams
      #   target: unifi

  generic:
    outputs:
      # Fallback route for emails that do not match
      # a supported source parser.
      - output: discord
        target: default

notifications:
  xo:
    # Send successful backup notifications.
    success: false

    # Send skipped backup notifications.
    skipped: true

    # Send failed backup notifications.
    failure: true

    # Include Xen Orchestra Job ID and Run ID.
    show_ids: false

  zabbix:
    # Include the Zabbix problem ID in notifications.
    show_ids: false
