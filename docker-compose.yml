# Development-only Compose file. Run it from the repository checkout on VM-09.
services:
  notifinho-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: notifinho-dev:local
    container_name: notifinho-dev
    restart: unless-stopped
    working_dir: /notifinho
    ports:
      - "8026:8025"
      - "18082:8080"
    volumes:
      - .:/notifinho
    environment:
      TZ: Europe/Lisbon
    command: /notifinho/start.sh
    init: true
    stop_grace_period: 20s
