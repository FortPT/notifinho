smtp:
  host: 0.0.0.0
  port: 8025

  # Optional explicit STARTTLS. Security remains disabled by default.
  tls:
    enabled: false
    certfile: "/notifinho/config/tls/cert.pem"
    keyfile: "/notifinho/config/tls/key.pem"

    # Defaults to true whenever TLS is enabled.
    # Set false only for a controlled migration.
    # require_starttls: false

  # Optional SMTP AUTH LOGIN/PLAIN. AUTH is available only after TLS.
  auth:
    enabled: false
    username: "notifinho"
    password_env: "NOTIFINHO_SMTP_PASSWORD"
    password_file: ""

    # Defaults to true whenever authentication is enabled.
    # Set false only for a controlled migration.
    # required: false

# Native infrastructure webhook listener and local backend API transport.
# It is enabled for the local WebUI. Publishing the container port remains an
# explicit deployment choice; use a firewall and trusted HTTPS reverse proxy.
http:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  max_body_bytes: 1048576
  shared_secret: ""

# Shared Redfish Event Service behavior for Supermicro, HPE, Dell, and
# standards-compliant generic Redfish subscriptions.
redfish:
  deduplication_window_seconds: 300

# Regional presentation is shared by notification formatters and the WebUI.
# Timezone uses an IANA name. time_format accepts "24" or "12"; 12-hour
# timestamps always include AM/PM.
presentation:
  timezone: "Europe/Lisbon"
  time_format: "24"

# Optional site-local names for Home Assistant events. Keep equipment names
# and addresses here so shared automations can stay generic.
home_assistant:
  aliases:
    endpoints:
      "192.0.2.10":
        device: "Building hub"
    components:
      "homeassistant.components.ipp.coordinator":
        device: "Office printer"
        endpoint: "192.0.2.20"

# Persistent v2 platform API state. First startup produces a short-lived,
# single-use setup token in container output; the WebUI uses it to create the
# first administrator without a default password. The directory must be
# absolute inside the container and writable by the configured non-root UID/GID.
platform:
  enabled: true
  # v2.2 uses config.yaml as the single source of truth. SQLite mirrors these
  # resources for history, retries, previews, and test delivery.
  configuration_model: "unified_yaml_v1"
  # Safe for upgrades that already persist /notifinho/config. The hardened
  # production Compose file overrides this with its dedicated /notifinho/state.
  state_dir: "/notifinho/config/platform-state"
  # Retain the newest private server-side state backups (1-100).
  backup_retention: 20
  # Scheduled private-state backups. Mount NFS/SMB on the Docker host and bind
  # it into the container; Notifinho does not receive share credentials.
  backups:
    schedule: disabled  # disabled, daily, weekly, or monthly
    time: "02:00"
    weekday: 0          # Monday=0, used for weekly schedules
    day: 1              # used for monthly schedules
    external_enabled: false
    external_type: nfs  # nfs or smb
    external_path: "/notifinho/external-backups"
    # v2.3 named destination selected by the WebUI. Empty keeps local state only.
    target_id: ""
    # Opt-in only with compose.managed-backups.yaml; otherwise bind-mount shares.
    managed_mounts: false
  # False permits direct HTTP login on a trusted LAN. Set true when every
  # browser reaches Notifinho through HTTPS.
  secure_cookies: false

# Same-origin v2 browser interface. This is served only when the HTTP listener,
# API, platform state, and this switch are all enabled. Keep secure cookies on
# and expose the interface only through a trusted HTTPS reverse proxy.
webui:
  enabled: true
  # Optional public HTTPS URL used when enforce_https is enabled. The reverse
  # proxy must provide the certificate and HTTPS listener.
  public_url: ""
  # Set true with public_url to redirect every plain-HTTP WebUI request.
  enforce_https: false
  # Supported interface languages: en-GB and pt-PT.
  language: "en-GB"
  # Optional WebUI-only presentation tags, editable from Sources.
  source_categories: {}

# Backend API transport for the WebUI and optional v1-compatible API. Management
# endpoints still require a browser session or explicitly configured token.
# Tokens must come from an environment variable, a mode-0600 mounted file, or
# a precomputed SHA-256.
api:
  enabled: true
  tokens:
    admin:
      enabled: false
      role: admin
      sources:
        - "*"
      token_env: "NOTIFINHO_ADMIN_TOKEN"
      rate_limit_per_minute: 60

    home_assistant:
      enabled: false
      role: application
      sources:
        - home_assistant
      token_file: "/run/secrets/notifinho_home_assistant_token"
      rate_limit_per_minute: 120

    hardware:
      enabled: false
      role: application
      sources:
        - redfish
        - supermicro
        - hpe_ilo
        - dell_idrac
      token_env: "NOTIFINHO_HARDWARE_TOKEN"
      # Alternatively generate a hash with:
      # printf %s 'TOKEN' | sha256sum
      # token_sha256: "PASTE_64_CHARACTER_SHA256_HERE"
      rate_limit_per_minute: 120

outputs:
  discord:
    # Set to false to disable all Discord notifications.
    enabled: true

    # Primary Discord destination.
    default:
      name: "Discord default"
      channel_name: "infrastructure-alerts"
      shared: true
      webhook: "PASTE_DISCORD_WEBHOOK_HERE"

    # Dedicated Grafana alert destination.
    grafana:
      webhook: "PASTE_GRAFANA_DISCORD_WEBHOOK_HERE"

    # Dedicated TrueNAS alert destination.
    truenas:
      webhook: "PASTE_TRUENAS_DISCORD_WEBHOOK_HERE"

    # Shared UniFi Network, Protect, and Drive destination.
    unifi:
      webhook: "PASTE_UNIFI_DISCORD_WEBHOOK_HERE"

    # Dedicated Portainer Alerting destination.
    portainer:
      webhook: "PASTE_PORTAINER_DISCORD_WEBHOOK_HERE"

    # Dedicated Proxmox VE destination.
    proxmox:
      webhook: "PASTE_PROXMOX_DISCORD_WEBHOOK_HERE"

    # Dedicated Synology DSM destination.
    synology:
      webhook: "PASTE_SYNOLOGY_DISCORD_WEBHOOK_HERE"

    # Shared hardware-management destination. Separate targets may be used
    # by changing each routing entry below.
    hardware:
      webhook: "PASTE_HARDWARE_DISCORD_WEBHOOK_HERE"

    home_assistant:
      webhook: "PASTE_HOME_ASSISTANT_DISCORD_WEBHOOK_HERE"

    # Optional secondary Discord destination.
    # Uncomment this block when forwarding selected hosts
    # to another Discord server or channel.
    #
    # palworld:
    #   webhook: "PASTE_SECONDARY_DISCORD_WEBHOOK_HERE"

  teams:
    # Change to true after adding a valid webhook
    # and enabling at least one Teams route below.
    enabled: false

    # Primary Microsoft Teams destination.
    default:
      webhook: "PASTE_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional separate Teams destination for Zabbix.
    #
    # zabbix:
    #   webhook: "PASTE_ZABBIX_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Teams destination for Grafana.
    #
    # grafana:
    #   webhook: "PASTE_GRAFANA_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Teams destination for TrueNAS.
    #
    # truenas:
    #   webhook: "PASTE_TRUENAS_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional shared UniFi destination.
    #
    # unifi:
    #   webhook: "PASTE_UNIFI_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Portainer destination.
    # portainer:
    #   webhook: "PASTE_PORTAINER_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Proxmox VE destination.
    # proxmox:
    #   webhook: "PASTE_PROXMOX_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional dedicated Synology DSM destination.
    # synology:
    #   webhook: "PASTE_SYNOLOGY_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional shared server-hardware destination.
    # hardware:
    #   webhook: "PASTE_HARDWARE_TEAMS_WORKFLOW_WEBHOOK_HERE"

    # Optional Home Assistant destination.
    # home_assistant:
    #   webhook: "PASTE_HOME_ASSISTANT_TEAMS_WORKFLOW_WEBHOOK_HERE"

routing:
  xo:
    outputs:
      # Send Xen Orchestra notifications to Discord.
      - output: discord
        target: default

      # To also send Xen Orchestra notifications to Microsoft Teams:
      # 1. Paste the Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: default

  zabbix:
    outputs:
      # Send every Zabbix notification to the primary
      # Discord destination.
      - output: discord
        target: default

      # To also send every Zabbix notification to Teams:
      # 1. Paste the Teams webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: default

      # Optional conditional route.
      #
      # This sends notifications only when the Zabbix host
      # exactly matches one of the names listed below.
      #
      # The primary destination above still receives every
      # Zabbix notification.
      #
      # - output: discord
      #   target: palworld
      #   match:
      #     hosts:
      #       - "VM-07 | Palworld"

      # Multiple hosts can use the same secondary destination:
      #
      # - output: discord
      #   target: palworld
      #   match:
      #     hosts:
      #       - "VM-07 | Palworld"
      #       - "VM-12 | Palworld Test"
      #       - "VM-18 | Game Server"

  qnap:
    outputs:
      # Send QNAP QTS and QuTS hero notifications to Discord.
      - output: discord
        target: default

      # To also send QNAP notifications to Microsoft Teams:
      # 1. Paste the Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: default

  grafana:
    outputs:
      # Send Grafana alerts to the dedicated Discord destination.
      - output: discord
        target: grafana

      # To also send Grafana alerts to a dedicated Teams destination:
      # 1. Paste the Grafana Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: grafana

  truenas:
    outputs:
      # Send TrueNAS alerts to the dedicated Discord destination.
      - output: discord
        target: truenas

      # To also send TrueNAS alerts to a dedicated Teams destination:
      # 1. Paste the TrueNAS Teams workflow webhook above.
      # 2. Change outputs.teams.enabled to true.
      # 3. Uncomment the following route.
      #
      # - output: teams
      #   target: truenas

  unifi_network:
    outputs:
      # Network and Protect may share one target or use separate targets.
      - output: discord
        target: unifi

      # - output: teams
      #   target: unifi

  unifi_protect:
    outputs:
      - output: discord
        target: unifi

      # - output: teams
      #   target: unifi

  unifi_drive:
    outputs:
      # Drive email follows the same normalized routing pipeline.
      - output: discord
        target: unifi

      # - output: teams
      #   target: unifi

  portainer:
    outputs:
      - output: discord
        target: portainer

      # - output: teams
      #   target: portainer

  proxmox:
    outputs:
      # SMTP and native webhook events share this source key.
      - output: discord
        target: proxmox

      # - output: teams
      #   target: proxmox

  synology:
    outputs:
      # SMTP, JSON, and form-encoded webhook events share this source key.
      - output: discord
        target: synology

      # - output: teams
      #   target: synology

  redfish:
    outputs:
      - output: discord
        target: hardware
      # - output: teams
      #   target: hardware

  supermicro:
    outputs:
      - output: discord
        target: hardware
      # - output: teams
      #   target: hardware

  hpe_ilo:
    outputs:
      - output: discord
        target: hardware
      # - output: teams
      #   target: hardware

  dell_idrac:
    outputs:
      - output: discord
        target: hardware
      # - output: teams
      #   target: hardware

  home_assistant:
    outputs:
      - output: discord
        target: home_assistant
      # - output: teams
      #   target: home_assistant

  # Example source accepted through POST /api/events. The submitting token
  # must explicitly include this source in api.tokens.<name>.sources.
  home_lab:
    outputs:
      - output: discord
        target: default

  generic:
    outputs:
      # Fallback route for emails that do not match
      # a supported source parser.
      - output: discord
        target: default

notifications:
  unifi_protect:
    # Optional mapping used when Protect sends a MAC/device identifier instead
    # of its human-readable camera name. Separators and letter case in the
    # identifier are ignored during matching.
    device_aliases:
      AABBCCDDEEFF: CAM-ENTRANCE-01

  xo:
    # Send successful backup notifications.
    success: false

    # Send skipped backup notifications.
    skipped: true

    # Send failed backup notifications.
    failure: true

    # Include Xen Orchestra Job ID and Run ID.
    show_ids: false

  zabbix:
    # Include the Zabbix problem ID in notifications.
    show_ids: false

  dell_idrac:
    # Optional trusted management clients whose successful session login or
    # logout audit records (USR0030/USR0032) should be acknowledged without
    # delivery, regardless of REDFISH/IPMI transport. Failed authentication
    # and unrelated security events are always kept.
    suppress_ipmi_session_audit_from: []
