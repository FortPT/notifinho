# Notifinho v2.5 process bootstrap configuration.
#
# Destinations, routes, application tokens, regional preferences, backup
# schedules, integration policies, aliases, and Redfish deduplication are stored
# in private platform state and managed from the WebUI.

smtp:
  enabled: true
  host: 0.0.0.0
  port: 8025
  tls:
    enabled: false
    certfile: /notifinho/config/tls/cert.pem
    keyfile: /notifinho/config/tls/key.pem
  auth:
    enabled: false
    username: notifinho
    password_env: NOTIFINHO_SMTP_PASSWORD
    password_file: ""

http:
  enabled: true
  host: 0.0.0.0
  port: 8080
  max_body_bytes: 1048576
  shared_secret: ""

api:
  enabled: true

platform:
  enabled: true
  configuration_model: platform_database_v1
  state_dir: /notifinho/config/platform-state
  backup_retention: 20
  secure_cookies: false

webui:
  enabled: true
  public_url: ""
  enforce_https: false
